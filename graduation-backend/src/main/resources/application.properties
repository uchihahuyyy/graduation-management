# Cấu hình kết nối SQL Server
spring.application.name=graduation-backend
server.port=8080

spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=GraduationDB;encrypt=true;trustServerCertificate=true;
spring.datasource.username=sa
spring.datasource.password=Huy@1135

# Cấu hình Hibernate (JPA)
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.format_sql=true

# Cấu hình Thymeleaf (Giao diện)
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html