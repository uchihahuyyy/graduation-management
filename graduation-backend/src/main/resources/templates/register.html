<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Graduation Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glassmorphism {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-teal-500 via-emerald-500 to-cyan-500 flex items-center justify-center p-4">
    <div class="glassmorphism rounded-3xl shadow-2xl overflow-hidden max-w-4xl w-full flex flex-col md:flex-row-reverse">
        <!-- Right Side: Branding -->
        <div class="w-full md:w-1/2 p-8 md:p-12 flex flex-col justify-center items-start bg-teal-900/10">
            <h1 class="text-4xl font-bold text-gray-900 mb-4">Tham gia<br>Cùng chúng tôi</h1>
            <p class="text-gray-700 text-lg mb-8">Tạo tài khoản để theo dõi kết quả xét tốt nghiệp một cách dễ dàng và nhanh chóng.</p>
        </div>
        
        <!-- Left Side: Register Form -->
        <div class="w-full md:w-1/2 p-8 md:p-12 bg-white/60">
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Tạo tài khoản mới</h2>
            <p class="text-gray-600 mb-8">Điền thông tin của bạn vào form bên dưới.</p>
            
            <div th:if="${errorMsg}" class="bg-red-100 border-l-4 border-red-500 text-red-700 p-4 mb-6 rounded-r">
                <p th:text="${errorMsg}"></p>
            </div>

            <form th:action="@{/register}" method="post" class="space-y-4">
                <div>
                    <label for="fullName" class="block text-sm font-medium text-gray-700 mb-1">Họ và tên</label>
                    <input type="text" id="fullName" name="fullName" required 
                        class="w-full px-4 py-3 bg-white/80 rounded-lg border border-gray-300 focus:ring-2 focus:ring-teal-500 focus:border-teal-500 transition-colors duration-200"
                        placeholder="Nguyễn Văn A">
                </div>

                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" id="email" name="email" required 
                        class="w-full px-4 py-3 bg-white/80 rounded-lg border border-gray-300 focus:ring-2 focus:ring-teal-500 focus:border-teal-500 transition-colors duration-200"
                        placeholder="email@example.com">
                </div>

                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Tên đăng nhập</label>
                    <input type="text" id="username" name="username" required 
                        class="w-full px-4 py-3 bg-white/80 rounded-lg border border-gray-300 focus:ring-2 focus:ring-teal-500 focus:border-teal-500 transition-colors duration-200"
                        placeholder="Nhập tên đăng nhập">
                </div>
                
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Mật khẩu</label>
                    <input type="password" id="password" name="password" required minlength="6"
                        class="w-full px-4 py-3 bg-white/80 rounded-lg border border-gray-300 focus:ring-2 focus:ring-teal-500 focus:border-teal-500 transition-colors duration-200"
                        placeholder="••••••••">
                </div>
                
                <button type="submit" 
                    class="w-full bg-teal-600 hover:bg-teal-700 text-white font-semibold py-3 px-4 rounded-lg shadow-lg hover:shadow-xl transition-all duration-200 transform hover:-translate-y-0.5 mt-4">
                    Đăng ký
                </button>
            </form>
            
            <p class="mt-8 text-center text-sm text-gray-700">
                Đã có tài khoản? 
                <a href="/login" class="font-semibold text-teal-700 hover:text-teal-900 transition-colors duration-200">Đăng nhập</a>
            </p>
        </div>
    </div>
</body>
</html>
