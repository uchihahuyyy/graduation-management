<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Báo cáo tốt nghiệp</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/graduation-dark.css}">
</head>
<body class="hold-transition sidebar-mini layout-fixed gm-dark">
<div class="wrapper">
    <nav class="main-header navbar navbar-expand"><ul class="navbar-nav"><li class="nav-item"><a class="nav-link" data-widget="pushmenu" href="#"><i class="fas fa-bars"></i></a></li><li class="nav-item d-none d-sm-inline-block"><a href="/dashboard" class="nav-link">Dashboard</a></li></ul></nav>
    <aside class="main-sidebar elevation-4"><a href="/dashboard" class="brand-link"><span class="brand-badge"><i class="fas fa-graduation-cap"></i></span><span class="brand-text">Graduation System</span></a><div class="sidebar"><nav class="mt-4"><ul class="nav nav-pills nav-sidebar flex-column"><li class="nav-item"><a href="/students" class="nav-link"><i class="nav-icon far fa-circle"></i><p>Sinh viên</p></a></li><li class="nav-item"><a href="/reports" class="nav-link active"><i class="nav-icon far fa-circle"></i><p>Báo cáo</p></a></li></ul></nav></div></aside>
    <div class="content-wrapper"><section class="content"><div class="container-fluid gm-shell">
        <h1 class="gm-page-title">Báo cáo tốt nghiệp</h1>
        <div class="row">
            <div class="col-md-4"><div class="gm-stat blue"><div class="label">Tổng sinh viên</div><div class="value" th:text="${#lists.size(students)}">0</div></div></div>
            <div class="col-md-4"><div class="gm-stat green"><div class="label">Đủ điều kiện</div><div class="value" th:text="${listResults.?[result == 1].size()}">0</div></div></div>
            <div class="col-md-4"><div class="gm-stat yellow"><div class="label">Chưa đủ điều kiện</div><div class="value" th:text="${listResults.?[result == 0].size()}">0</div></div></div>
        </div>
        <div class="card gm-crud-card mt-4">
            <div class="card-header"><h3 class="card-title">Xuất báo cáo</h3></div>
            <div class="card-body">
                <a href="/students/export" class="btn btn-success"><i class="fas fa-file-excel"></i> Xuất Excel danh sách sinh viên</a>
                <button class="btn btn-outline-light" type="button"><i class="fas fa-file-pdf"></i> Xuất PDF danh sách đủ điều kiện</button>
                <button class="btn btn-outline-light" type="button"><i class="fas fa-chart-bar"></i> Thống kê xếp loại</button>
            </div>
        </div>
    </div></section></div>
</div>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
</body>
</html>
