<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${isEdit ? 'Sửa sinh viên' : 'Thêm sinh viên'}">Sinh viên</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/graduation-dark.css}">
</head>
<body class="hold-transition sidebar-mini layout-fixed gm-dark">
<div class="wrapper">
    <nav class="main-header navbar navbar-expand"><ul class="navbar-nav"><li class="nav-item"><a href="/students" class="nav-link"><i class="fas fa-arrow-left"></i> Danh sách sinh viên</a></li></ul></nav>
    <aside class="main-sidebar elevation-4"><a href="/dashboard" class="brand-link"><span class="brand-badge"><i class="fas fa-graduation-cap"></i></span><span class="brand-text">Graduation System</span></a></aside>
    <div class="content-wrapper"><section class="content"><div class="container-fluid gm-shell">
        <h1 class="gm-page-title" th:text="${isEdit ? 'Sửa sinh viên' : 'Thêm sinh viên'}">Thêm sinh viên</h1>
        <div class="card gm-crud-card">
            <div class="card-header"><h3 class="card-title">Thông tin sinh viên</h3></div>
            <form th:action="@{/students/save}" th:object="${studentDTO}" method="post">
                <input type="hidden" th:field="*{id}">
                <div class="card-body"><div class="row">
                    <div class="col-md-4 form-group"><label>Mã sinh viên</label><input type="text" th:field="*{studentCode}" class="form-control" required></div>
                    <div class="col-md-4 form-group"><label>Họ tên</label><input type="text" th:field="*{fullName}" class="form-control" required></div>
                    <div class="col-md-4 form-group"><label>Email</label><input type="email" th:field="*{email}" class="form-control"></div>
                    <div class="col-md-3 form-group"><label>Ngày sinh</label><input type="date" th:field="*{dateOfBirth}" class="form-control"></div>
                    <div class="col-md-3 form-group"><label>Giới tính</label><select th:field="*{gender}" class="custom-select"><option value="">Chọn</option><option value="Nam">Nam</option><option value="Nữ">Nữ</option><option value="Khác">Khác</option></select></div>
                    <div class="col-md-3 form-group"><label>Lớp</label><input type="text" th:field="*{className}" class="form-control" placeholder="VD: DCT121"></div>
                    <div class="col-md-3 form-group"><label>Khóa</label><input type="text" th:field="*{cohort}" class="form-control" placeholder="VD: K21"></div>
                    <div class="col-md-3 form-group"><label>GPA</label><input type="number" step="0.01" th:field="*{gpa}" class="form-control"></div>
                    <div class="col-md-3 form-group"><label>Tổng tín chỉ</label><input type="number" th:field="*{totalCredits}" class="form-control"></div>
                    <div class="col-md-3 form-group"><label>Tín chỉ rớt</label><input type="number" th:field="*{failedCredits}" class="form-control"></div>
                    <div class="col-md-3 form-group"><label>Trạng thái</label><select th:field="*{isActive}" class="custom-select"><option value="true">Active</option><option value="false">Inactive</option></select></div>
                    <div class="col-md-6 form-group"><label>Tiếng Anh</label><input type="text" th:field="*{englishStatus}" class="form-control" placeholder="B1, TOEIC 450..."></div>
                    <div class="col-md-6 form-group"><label>Tin học</label><input type="text" th:field="*{itStatus}" class="form-control" placeholder="Đạt, MOS..."></div>
                </div></div>
                <div class="card-footer"><button class="btn btn-primary" type="submit"><i class="fas fa-save"></i> Lưu</button> <a href="/students" class="btn btn-secondary">Quay lại</a></div>
            </form>
        </div>
    </div></section></div>
</div>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
</body>
</html>
