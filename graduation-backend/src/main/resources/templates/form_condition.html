<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isEdit ? 'Sửa Điều kiện' : 'Thêm Điều kiện'} + ' - Graduation Management'">Form Điều kiện</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- NAVBAR -->
    <nav class="bg-gradient-to-r from-indigo-700 via-purple-700 to-pink-600 text-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="/" class="text-xl font-bold tracking-wide flex items-center gap-2">
                <i class="fas fa-graduation-cap"></i> Graduation Management
            </a>
            <div class="flex items-center gap-4">
                <a href="/" class="hover:bg-white/20 px-3 py-2 rounded-lg transition text-sm"><i class="fas fa-list mr-1"></i> Điều kiện</a>
                <a href="/results" class="hover:bg-white/20 px-3 py-2 rounded-lg transition text-sm"><i class="fas fa-poll mr-1"></i> Kết quả</a>
                <a sec:authorize="hasAuthority('ROLE_SUPERADMIN')" href="/admin/users" class="hover:bg-white/20 px-3 py-2 rounded-lg transition text-sm"><i class="fas fa-users-cog mr-1"></i> Quản lý User</a>
                <span class="text-sm opacity-80">|</span>
                <span class="text-sm" sec:authentication="name"></span>
                <form th:action="@{/logout}" method="post" class="inline">
                    <button type="submit" class="bg-white/20 hover:bg-white/30 px-3 py-2 rounded-lg transition text-sm"><i class="fas fa-sign-out-alt mr-1"></i> Đăng xuất</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="max-w-3xl mx-auto px-4 py-8">
        <!-- Header -->
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-800">
                <i class="fas fa-clipboard-list text-indigo-600 mr-2"></i>
                <span th:text="${isEdit ? 'Sửa Điều kiện Xét Tốt nghiệp' : 'Thêm Điều kiện Xét Tốt nghiệp'}">Form</span>
            </h1>
            <p class="text-gray-500 mt-1" th:text="${isEdit ? 'Chỉnh sửa thông tin điều kiện xét tốt nghiệp.' : 'Nhập thông tin cho điều kiện xét tốt nghiệp mới.'}">Mô tả</p>
        </div>

        <!-- Form -->
        <div class="bg-white rounded-2xl shadow-lg p-8 border border-gray-100">
            <form th:action="@{/conditions/save}" th:object="${conditionDTO}" method="post" class="space-y-6">
                <!-- Hidden ID cho Sửa -->
                <input type="hidden" th:field="*{id}" />

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="appliedCohort" class="block text-sm font-medium text-gray-700 mb-1">Khóa áp dụng <span class="text-red-500">*</span></label>
                        <input type="text" id="appliedCohort" th:field="*{appliedCohort}" required
                            class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors"
                            placeholder="VD: K22, K23">
                    </div>
                    <div>
                        <label for="minTotalCredits" class="block text-sm font-medium text-gray-700 mb-1">Tín chỉ tối thiểu</label>
                        <input type="number" id="minTotalCredits" th:field="*{minTotalCredits}"
                            class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors"
                            placeholder="VD: 120">
                    </div>
                    <div>
                        <label for="minGpa" class="block text-sm font-medium text-gray-700 mb-1">GPA tối thiểu</label>
                        <input type="number" step="0.01" id="minGpa" th:field="*{minGpa}"
                            class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors"
                            placeholder="VD: 2.00">
                    </div>
                    <div>
                        <label for="maxFailedCredits" class="block text-sm font-medium text-gray-700 mb-1">Tín chỉ nợ tối đa</label>
                        <input type="number" id="maxFailedCredits" th:field="*{maxFailedCredits}"
                            class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors"
                            placeholder="VD: 0">
                    </div>
                    <div>
                        <label for="englishRequirement" class="block text-sm font-medium text-gray-700 mb-1">Chuẩn Tiếng Anh</label>
                        <input type="text" id="englishRequirement" th:field="*{englishRequirement}"
                            class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors"
                            placeholder="VD: TOEIC 450">
                    </div>
                    <div>
                        <label for="itRequirement" class="block text-sm font-medium text-gray-700 mb-1">Chuẩn Tin học</label>
                        <input type="text" id="itRequirement" th:field="*{itRequirement}"
                            class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors"
                            placeholder="VD: IC3, MOS">
                    </div>
                    <div>
                        <label for="conductRequired" class="block text-sm font-medium text-gray-700 mb-1">Hạnh kiểm yêu cầu</label>
                        <input type="text" id="conductRequired" th:field="*{conductRequired}"
                            class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors"
                            placeholder="VD: Trung bình trở lên">
                    </div>
                </div>

                <div>
                    <label for="note" class="block text-sm font-medium text-gray-700 mb-1">Ghi chú</label>
                    <textarea id="note" th:field="*{note}" rows="3"
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors"
                        placeholder="Ghi chú thêm (nếu có)..."></textarea>
                </div>

                <div class="flex items-center gap-4 pt-4">
                    <button type="submit"
                        class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-8 rounded-xl shadow-lg hover:shadow-xl transition-all duration-200 flex items-center gap-2">
                        <i th:class="${isEdit ? 'fas fa-save' : 'fas fa-plus'}"></i>
                        <span th:text="${isEdit ? 'Cập nhật' : 'Thêm mới'}">Lưu</span>
                    </button>
                    <a href="/" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold py-3 px-8 rounded-xl transition-all duration-200">
                        <i class="fas fa-arrow-left mr-1"></i> Quay lại
                    </a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
