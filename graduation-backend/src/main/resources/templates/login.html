<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Graduation Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glassmorphism {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 flex items-center justify-center p-4">
    <div class="glassmorphism rounded-3xl shadow-2xl overflow-hidden max-w-4xl w-full flex flex-col md:flex-row">
        <!-- Left Side: Branding -->
        <div class="w-full md:w-1/2 p-8 md:p-12 flex flex-col justify-center items-start bg-indigo-900/10">
            <h1 class="text-4xl font-bold text-gray-900 mb-4">Graduation<br>Management</h1>
            <p class="text-gray-700 text-lg mb-8">Hệ thống quản lý xét tốt nghiệp chuyên nghiệp, hiện đại và bảo mật.</p>
        </div>
        
        <!-- Right Side: Login Form -->
        <div class="w-full md:w-1/2 p-8 md:p-12 bg-white/60">
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Chào mừng trở lại!</h2>
            <p class="text-gray-600 mb-8">Vui lòng đăng nhập vào tài khoản của bạn.</p>
            
            <div th:if="${param.error}" class="bg-red-100 border-l-4 border-red-500 text-red-700 p-4 mb-6 rounded-r">
                <p>Tên đăng nhập hoặc mật khẩu không đúng!</p>
            </div>
            <div th:if="${param.logout}" class="bg-green-100 border-l-4 border-green-500 text-green-700 p-4 mb-6 rounded-r">
                <p>Bạn đã đăng xuất thành công.</p>
            </div>
            <div th:if="${successMsg}" class="bg-green-100 border-l-4 border-green-500 text-green-700 p-4 mb-6 rounded-r">
                <p th:text="${successMsg}"></p>
            </div>

            <form th:action="@{/login}" method="post" class="space-y-6">
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Tên đăng nhập</label>
                    <input type="text" id="username" name="username" required 
                        class="w-full px-4 py-3 bg-white/80 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors duration-200"
                        placeholder="Nhập tên đăng nhập...">
                </div>
                
                <div>
                    <div class="flex items-center justify-between mb-1">
                        <label for="password" class="block text-sm font-medium text-gray-700">Mật khẩu</label>
                    </div>
                    <input type="password" id="password" name="password" required 
                        class="w-full px-4 py-3 bg-white/80 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors duration-200"
                        placeholder="••••••••">
                </div>
                
                <button type="submit" 
                    class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-4 rounded-lg shadow-lg hover:shadow-xl transition-all duration-200 transform hover:-translate-y-0.5">
                    Đăng nhập
                </button>
            </form>
            
            <p class="mt-8 text-center text-sm text-gray-700">
                Chưa có tài khoản? 
                <a href="/register" class="font-semibold text-indigo-700 hover:text-indigo-900 transition-colors duration-200">Đăng ký ngay</a>
            </p>
        </div>
    </div>
</body>
</html>
